services:
  - type: web
    name: project-tracker-api
    runtime: node
    buildCommand: npm install --prefix server
    startCommand: npm start --prefix server
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: DB_PATH
        value: /var/data/projects.db
      - key: UPLOADS_DIR
        value: /var/data/uploads
    disk:
      name: data
      mountPath: /var/data
      sizeGB: 10

  - type: web
    name: project-tracker-web
    runtime: node
    buildCommand: npm install && npm run build
    startCommand: npx serve -s build -l 3000
    envVars:
      - key: REACT_APP_API_BASE_URL
        fromService:
          name: project-tracker-api
          property: url
    routes:
      - type: http
        path: /
